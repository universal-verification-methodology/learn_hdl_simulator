title: Simulator path complete
footer: learn_hdl_simulator — wrap
slides:
- type: title
  title: Simulator path complete
  subtitle: You now have a working map of the browser HDL Simulator path
  notes: You now have a working map of the browser HDL Simulator path. You can name
    the IDE panes, control a tiny DUT with Run, Stop, and Reset, step and continue
    with a halt mindset, poke and force safely, read waves with cursors, link multi-file
    projects, and golden-compare at a cursor—then practice freely in the public IDE.
- type: bullets
  title: Skills you can reuse
  bullets:
  - Files, Hierarchy, Signals, Wave, and Console are reusable in almost any HDL IDE
  - Soft poke versus sticky force, and releasing when done, transfers to professional
    tools
  - Golden compare at a known time is the seed of stronger checking
  - Style and synth awareness keeps sim-only habits from becoming silicon surprises
  notes: Files, Hierarchy, Signals, Wave, and Console are reusable in almost any HDL
    IDE. Soft poke versus sticky force, and releasing when done, transfers to professional
    tools. Golden compare at a known time is the seed of stronger checking. Style
    and synth awareness keeps sim-only habits from becoming silicon surprises.
- type: two_column
  title: Dual-track recap
  left:
  - If you mainly used browser labs
  - If you mainly used the public simulator, revisit any hdl-sim lab for graded challenges
  - Either way, confirm you can open the public simulator without getting lost
  right: assets/tools-index.png
  notes: If you mainly used browser labs, open the public IDE and recreate one tour
    plus waves session. If you mainly used the public simulator, revisit any hdl-sim
    lab for graded challenges. Either way, confirm you can open the public simulator
    without getting lost.
- type: bullets
  title: Where to go next
  bullets:
  - For offline compile and sim fidelity, continue to learn Icarus Verilog or learn
    Verilator
  - For protocol bring-up, UART, SPI, and I²C courses reuse the same wave and TB habits
  - For deeper SystemVerilog and UVM, climb the syllabus ladder when you are ready
  notes: For offline compile and sim fidelity, continue to learn Icarus Verilog or
    learn Verilator. For protocol bring-up, UART, SPI, and I²C courses reuse the same
    wave and TB habits. For deeper SystemVerilog and UVM, climb the syllabus ladder
    when you are ready.
- type: bullets
  title: Mindset to keep
  bullets:
  - Prefer tiny DUTs when learning tools
  - Read the Console before blaming the RTL
  - Never leave forces on
  - Know which file is top
  - And remember
  notes: 'Prefer tiny DUTs when learning tools. Read the Console before blaming the
    RTL. Never leave forces on. Know which file is top. And remember: literacy labs
    teach the moves; real confidence comes from time in the IDE and, later, in offline
    simulators.'
- type: bullets
  title: Closing
  bullets:
  - Check off the wrap checklist
  - You finished the learn HDL simulator path
  - Open the public IDE once more if you want a victory lap
  notes: Check off the wrap checklist. You finished the learn HDL simulator path.
    Open the public IDE once more if you want a victory lap, then pick the next course
    that matches your goal—language depth, offline sim, or protocols.
