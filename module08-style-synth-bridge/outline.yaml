title: Style & synth hints
footer: learn_hdl_simulator — style synth bridge
slides:
- type: title
  title: Style & synth hints
  subtitle: Simulator literacy is not only Run and waves
  notes: Simulator literacy is not only Run and waves. Style and synthesizability
    cues catch problems early—messy naming, risky constructs, or lint that would hurt
    an FPGA or ASIC path. This short bridge connects the IDE session to those hints
    without becoming a full RTL course.
- type: bullets
  title: What to notice
  bullets:
  - In style practice, watch naming, module structure
  - In synth-lint practice
  - One named idea you will watch for later is enough for this module
  notes: In style practice, watch naming, module structure, and readability cues that
    keep reviews sane. In synth-lint practice, watch constructs that simulate fine
    but synthesize poorly—or warnings that deserve a second look. One named idea you
    will watch for later is enough for this module.
- type: image
  title: Browser labs
  image: assets/lab-starter.png
  caption: Lab starter
  notes: Open the HDL style lab and the synth-lint lab from the tools index. Load
    a starter in each, read one finding or challenge prompt, and restate it in your
    own words. You do not need to finish every challenge—capture one style idea and
    one synth or lint idea.
- type: bullets
  title: Public simulator practice
  bullets:
  - In the public IDE
  - Even if the IDE is quiet, ask yourself one synth question
  - Carry that question into later Verilog and Verilator work
  notes: 'In the public IDE, open a small DUT and notice any style or lint warnings
    the tool surfaces. Even if the IDE is quiet, ask yourself one synth question:
    would this reset or latch pattern survive a real build? Carry that question into
    later Verilog and Verilator work.'
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not treat this bridge as a complete coding-standard course
  - Do not ignore lint just because the sim passed
  - Do not “fix” synth issues by forcing signals in the wave, that hides the problem
  - 'Keep the scope small: awareness now, depth in sibling courses'
  notes: 'Do not treat this bridge as a complete coding-standard course. Do not ignore
    lint just because the sim passed. Do not “fix” synth issues by forcing signals
    in the wave—that hides the problem. Keep the scope small: awareness now, depth
    in sibling courses.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist
  - 'Optional: note the same idea once in the public simulator'
  - When you are ready, take the short quiz, then spend free practice time in the
    public IDE
  notes: 'Complete the checklist: open at least one of the bridge labs and name one
    style or lint idea to watch in the IDE. Optional: note the same idea once in the
    public simulator. When you are ready, take the short quiz, then spend free practice
    time in the public IDE.'
